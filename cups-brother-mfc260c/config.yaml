name: "CUPS Addon (Brother MFC-260C)"
version: "1.0.0"
slug: cups-brother-mfc260c
description: >
  CUPS print server with Avahi/AirPrint support for the Brother MFC-260C.

url: "https://github.com/Zocker1012/ha-cups-addon"

arch:
  - amd64

map:
  - addon_config:rw

usb: true
init: false
host_network: true

ports:
  631/tcp: 631
ports_description:
  631/tcp: "CUPS web interface and printing"

ingress: true
ingress_port: 8080
ingress_stream: true
panel_icon: mdi:printer
panel_title: CUPS

options: {}
schema: {}
